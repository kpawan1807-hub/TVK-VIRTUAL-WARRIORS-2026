<!DOCTYPE html>
<html>

<head>
<title>TVK Virtual Warrior</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 class="title">தமிழக வெற்றிக் கழகம்</h1>
<h2>TVK Virtual Warrior Registration</h2>

<form id="form">

<input type="text" id="name" placeholder="பெயர் / Name" required>

<input type="number" id="year" placeholder="பிறந்த ஆண்டு / Birth Year" required>

<input type="text" id="area" placeholder="சட்டமன்றம் / Constituency" required>

<input type="text" id="district" placeholder="மாவட்டம் / District" required>

<input type="text" id="state" placeholder="மாநிலம் / State" required>

<input type="file" id="photo" required>

<button type="submit">Generate PVC Card</button>

</form>

<div id="card"></div>

<script src="script.js"></script>

</body>
</html>
